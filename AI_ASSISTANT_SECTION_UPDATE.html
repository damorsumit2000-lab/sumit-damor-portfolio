<style>
/* AI Assistant Section Styling - Matches Website Design */
.ai-assistant-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 48px 40px;
    margin-bottom: 60px;
    transition: all 0.3s ease;
    animation: fadeInUp 0.6s ease;
}

.ai-assistant-section:hover {
    box-shadow: 0 8px 24px var(--shadow-hover);
    transform: translateY(-2px);
}

.ai-assistant-section h2 {
    text-align: center;
    font-size: 2.2em;
    margin-bottom: 16px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--secondary), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.01em;
}

.ai-intro {
    text-align: center;
    color: var(--text-secondary);
    font-size: 1.05em;
    margin-bottom: 32px;
    line-height: 1.7;
    max-width: 560px;
    margin-left: auto;
    margin-right: auto;
}

.ai-container {
    background: var(--bg);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px var(--shadow);
}

/* Responsive AI Section */
@media (max-width: 768px) {
    .ai-assistant-section {
        padding: 32px 24px;
    }
    
    .ai-assistant-section h2 {
        font-size: 1.8em;
    }
    
    .ai-intro {
        font-size: 1em;
    }
}
</style>

<!-- ============================================ -->
<!-- STEP 2: REPLACE THE CURRENT AI ASSISTANT SECTION -->
<!-- Find the section with "💬 AI Assistant" and replace it with this: -->
<!-- IMPORTANT: Place this AFTER the header and BEFORE "About Me" section -->
<!-- ============================================ -->

<div class="section ai-assistant-section">
    <h2>Ask Me Anything</h2>
    <p class="ai-intro">
        Have questions about my experience, skills, or projects? Chat with my AI assistant below for instant, detailed answers about my portfolio!
    </p>
    <div class="ai-container">
        <div id="chatbot-inline-container"></div>
    </div>
</div>
