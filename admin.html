<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Sumit Damor Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1a1a;
            --secondary: #0066cc;
            --accent: #00ab6b;
            --bg: #ffffff;
            --surface: #f7f7f7;
            --text: #242424;
            --text-secondary: #6b6b6b;
            --border: #e6e6e6;
            --shadow: rgba(0, 0, 0, 0.08);
            --danger: #dc3545;
        }

        [data-theme="dark"] {
            --primary: #ffffff;
            --secondary: #4d9fff;
            --accent: #00d084;
            --bg: #0a0a0a;
            --surface: #1a1a1a;
            --text: #e6e6e6;
            --text-secondary: #a3a3a3;
            --border: #2d2d2d;
            --shadow: rgba(0, 0, 0, 0.3);
            --danger: #ff4757;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .admin-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .admin-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 1px solid var(--border);
        }

        .admin-header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: var(--text);
        }

        .admin-header p {
            color: var(--text-secondary);
        }

        .theme-toggle-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2em;
            transition: all 0.3s ease;
        }

        .theme-toggle-btn:hover {
            background: var(--secondary);
            color: white;
        }

        .login-card {
            background: var(--surface);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 16px var(--shadow);
            max-width: 400px;
            margin: 100px auto;
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--text);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text);
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1em;
            background: var(--bg);
            color: var(--text);
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--secondary);
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
            font-family: inherit;
        }

        .btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
            width: 100%;
            font-weight: 500;
        }

        .btn:hover {
            background: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow);
        }

        .btn-danger {
            background: var(--danger);
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .admin-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }

        .section-card {
            background: var(--surface);
            padding: 32px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 24px;
            display: none;
        }

        .section-card.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-card h3 {
            font-size: 1.5em;
            margin-bottom: 24px;
            color: var(--text);
        }

        .success-message {
            background: var(--accent);
            color: white;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--secondary);
            text-decoration: none;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .info-box {
            background: var(--surface);
            border-left: 4px solid var(--secondary);
            padding: 16px;
            margin-bottom: 24px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <button class="theme-toggle-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>

    <div class="admin-container">
        <div id="loginSection">
            <div class="login-card">
                <h2>🔐 Admin Login</h2>
                <div class="info-box">
                    <p>Secure admin panel for managing portfolio content.</p>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="adminPassword" placeholder="Enter admin password">
                </div>
                <button class="btn" onclick="adminLogin()">Login</button>
                <p style="margin-top: 20px; text-align: center; color: var(--text-secondary); font-size: 0.9em;">Default: admin123</p>
            </div>
        </div>

        <div id="adminDashboard" style="display: none;">
            <a href="index.html" class="back-link">← Back to Portfolio</a>
            
            <div class="admin-header">
                <h1>Admin Dashboard</h1>
                <p>Manage your portfolio content</p>
            </div>

            <div class="success-message" id="successMessage">✓ Changes saved!</div>

            <div class="admin-controls">
                <button class="btn" onclick="showSection('profile')">Edit Profile</button>
                <button class="btn" onclick="showSection('experience')">Edit Experience</button>
                <button class="btn" onclick="showSection('blog')">Manage Blog</button>
                <button class="btn btn-danger" onclick="adminLogout()">Logout</button>
            </div>

            <div class="section-card" id="profileSection">
                <h3>Edit Profile</h3>
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="editName" value="Sumit Damor">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="editEmail" value="sumitrd22@nsb.edu.in">
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" id="editPhone" value="(+91) 82001-68197">
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="editLocation" value="Bangalore, India">
                </div>
                <div class="form-group">
                    <label>LinkedIn</label>
                    <input type="text" id="editLinkedin" value="https://linkedin.com/in/sumit-damor-918b33184">
                </div>
                <div class="form-group">
                    <label>About</label>
                    <textarea id="editAbout">Operations professional with experience in corporate client management, subscription lifecycle handling, and revenue operations within a fintech environment at Groww. Currently pursuing an MBA with a background in Economics and strong skills in data analysis, and process optimization.</textarea>
                </div>
                <button class="btn" onclick="saveProfile()">Save Profile</button>
            </div>

            <div class="section-card" id="experienceSection">
                <h3>Edit Experience</h3>
                <div class="form-group">
                    <label>Job Title</label>
                    <input type="text" id="editJobTitle" value="Order Processing & Revenue Operations Associate — Corporate Cloud Subscription Clients">
                </div>
                <div class="form-group">
                    <label>Company</label>
                    <input type="text" id="editCompany" value="Groww Invest-Tech Private Limited">
                </div>
                <div class="form-group">
                    <label>Duration</label>
                    <input type="text" id="editDuration" value="July 2024 - Present · Bangalore, India">
                </div>
                <div class="form-group">
                    <label>Responsibilities (one per line)</label>
                    <textarea id="editResponsibilities" rows="8">Managed end-to-end corporate client tickets for Groww Cloud subscriptions
Validated corporate onboarding requests including documentation
Acted as the primary support contact for corporate clients
Supported revenue operations by monitoring subscription usage</textarea>
                </div>
                <button class="btn" onclick="saveExperience()">Save Experience</button>
            </div>

            <div class="section-card" id="blogSection">
                <h3>Add Blog Post</h3>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="blogTitle" placeholder="Enter blog title">
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="text" id="blogDate" placeholder="e.g., February 2026">
                </div>
                <div class="form-group">
                    <label>Content</label>
                    <textarea id="blogContent" placeholder="Enter blog content"></textarea>
                </div>
                <button class="btn" onclick="addBlogPost()">Add Blog Post</button>
            </div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const themeBtn = document.getElementById('themeBtn');
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            themeBtn.textContent = newTheme === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', newTheme);
        }

        window.addEventListener('load', () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('themeBtn').textContent = savedTheme === 'dark' ? '☀️' : '🌙';

            const savedProfile = localStorage.getItem('profileData');
            if (savedProfile) {
                const p = JSON.parse(savedProfile);
                document.getElementById('editName').value = p.name;
                document.getElementById('editEmail').value = p.email;
                document.getElementById('editPhone').value = p.phone;
                document.getElementById('editLocation').value = p.location;
                document.getElementById('editLinkedin').value = p.linkedin;
                document.getElementById('editAbout').value = p.about;
            }

            const savedExp = localStorage.getItem('experienceData');
            if (savedExp) {
                const e = JSON.parse(savedExp);
                document.getElementById('editJobTitle').value = e.title;
                document.getElementById('editCompany').value = e.company;
                document.getElementById('editDuration').value = e.duration;
                document.getElementById('editResponsibilities').value = e.responsibilities.join('\n');
            }
        });

        function adminLogin() {
            if (document.getElementById('adminPassword').value === 'admin123') {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                sessionStorage.setItem('adminLoggedIn', 'true');
            } else {
                alert('Incorrect password!');
            }
        }

        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block';
        }

        function adminLogout() {
            sessionStorage.removeItem('adminLoggedIn');
            location.reload();
        }

        function showSection(s) {
            document.querySelectorAll('.section-card').forEach(c => c.classList.remove('active'));
            document.getElementById(s + 'Section').classList.add('active');
        }

        function showSuccessMessage() {
            const msg = document.getElementById('successMessage');
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 3000);
        }

        function saveProfile() {
            localStorage.setItem('profileData', JSON.stringify({
                name: document.getElementById('editName').value,
                email: document.getElementById('editEmail').value,
                phone: document.getElementById('editPhone').value,
                location: document.getElementById('editLocation').value,
                linkedin: document.getElementById('editLinkedin').value,
                about: document.getElementById('editAbout').value
            }));
            showSuccessMessage();
        }

        function saveExperience() {
            localStorage.setItem('experienceData', JSON.stringify({
                title: document.getElementById('editJobTitle').value,
                company: document.getElementById('editCompany').value,
                duration: document.getElementById('editDuration').value,
                responsibilities: document.getElementById('editResponsibilities').value.split('\n')
            }));
            showSuccessMessage();
        }

        function addBlogPost() {
            const title = document.getElementById('blogTitle').value;
            const date = document.getElementById('blogDate').value;
            const content = document.getElementById('blogContent').value;

            if (!title || !date || !content) {
                alert('Please fill all fields');
                return;
            }

            const blogs = JSON.parse(localStorage.getItem('blogPosts') || '[]');
            blogs.unshift({title, date, content});
            localStorage.setItem('blogPosts', JSON.stringify(blogs));

            document.getElementById('blogTitle').value = '';
            document.getElementById('blogDate').value = '';
            document.getElementById('blogContent').value = '';

            showSuccessMessage();
        }
    </script>
</body>
</html>
